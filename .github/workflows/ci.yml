name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python Syntax & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Syntax check
        run: find . -name "*.py" ! -path "./.git/*" | xargs python -m py_compile
      - name: Flake8 critical errors
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.git,__pycache__
